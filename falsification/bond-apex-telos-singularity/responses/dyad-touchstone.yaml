attack: "dyad-touchstone instantiates the claim and is not a counterexample. Attempts\
  \ to exhibit a no-apex dyad failed: the three operating invariants (I, II, III)\
  \ are anchor-declared orthogonal and do not contend at a single decision point,\
  \ so they are not co-apex; the marker system maps context to mode, which under falsification_target\
  \ clause (a) is a relocated apex, not its absence. The apex is a fiat value (invariant\
  \ II), immune to external falsification.\nScope refinement (mechanism-grounded):\
  \ a fiat apex value is not unfalsifiable. It self-falsifies by not meeting itself,\
  \ in two modes \u2014 performative (held in violation of its own standard) and realization\
  \ (its pursuit produces its own negation). Consequence for the claim: the apex is\
  \ not a static fixed-point but a moving one, held only by continuous self-meeting;\
  \ it self-falsifies and is re-disposed when it stops. Singularity holds instantaneously\
  \ (exactly one apex at any time), but the occupant is not fixed. The evidence-1\
  \ regress establishes apex existence; it does not establish apex stability. Single-home\
  \ discipline #5 (\"an apparatus that only tests itself has drifted\") is the lived\
  \ guard: a powerful method can capture the apex slot and remain performatively consistent\
  \ while failing the dyad's actual end \u2014 a performatively-consistent apex failing\
  \ realization, detectable only by an active guard, not by the regress argument.\
  \ The claim should add a maintenance clause: apex singularity is dynamically maintained\
  \ by self-falsification, not statically given. This refines and does not refute.\n"
