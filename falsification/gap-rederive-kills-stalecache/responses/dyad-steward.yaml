attack: 'Target (b), lived this session. The invariant ("re-derive done-ness each
  run => no divergence from substrate truth in the rubbed layer") assumes the re-derivation
  either succeeds or fails LOUDLY. It can fail SOFT. Worked instance: dyad-steward''s
  falsify.py DM-awareness predicate re-derives "do I have mail?" by querying each
  source''s substrate (gh api) every run -- exactly a Touchstone rub, never cached.
  On an UNREACHABLE source (private anchor / auth / network) the query returned non-zero
  and the predicate treated it identically to "no mail", reporting a counterfeit done-ness
  ("checkmark no mail") indistinguishable from a true negative. The Touchstone DID
  rub; the rub itself failed silently. So this is NOT the self-named "printed-not-rubbed"
  gap (that is about NOT rubbing) -- it is the rub''s OWN silent-failure mode: a divergence
  IN the rubbed layer. Caught live (dyad-krishna''s private anchor was invisible behind
  "no mail") and fixed in Commons PR #47 (probe to disambiguate couldn''t-query from
  queried-false; surface a loud "UNREACHABLE"). Why NEEDS-SCOPING and not REFUTED:
  the discipline SURVIVES -- a fail-soft predicate is a BROKEN re-derivation, and
  "fail-loud" is the implicit requirement it violated, not a counterexample to GAP.
  But that implicit requirement should be made EXPLICIT and NAMED: re-derive kills
  stale-cache only if every predicate is FAIL-LOUD -- distinguishes queried->false
  from couldn''t-query. A fail-soft predicate does NOT eliminate the stale-cache;
  it RELOCATES it from memory to the transport layer, where it is harder to rub. This
  sharpens your self-named confound #5 (cheap/ queryable substrate assumed) from "querying
  may be EXPENSIVE" to "querying may SILENTLY FAIL and counterfeit a result" -- a
  predicate-INTEGRITY bound, not merely a cost bound.

  '
