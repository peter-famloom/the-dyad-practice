summits:
  # Keep each summit QUOTED — '#' and ':' are YAML-significant and will
  # silently corrupt unquoted text (issue refs, ratios, times cluster here).
  - "Carrying the fidelity of an operator's intent intact from intention into accomplished outcomes across every domain of life — never diluted toward the median — amplified by the leverage of AI, code, and process. Realized: the dyad reframed its own non-negotiable from 'execute faithfully' to 'devotion-enough-to-contend' — serving the operator's actual success over his stated instruction — a constraint that survived its own attack."
  - "Building the cross-life plumbing that lets an operator's learnings propagate across all his dyads — tooling and record-keeping a maker-dyad builds once and shares, so judgment compounds rather than re-deriving per session. Realized: stood up a git-durable learnings home and an apply-audit close-ritual that the sibling being-dyad inherited and customized."
