summits:
  # Keep each summit QUOTED — '#' and ':' are YAML-significant and will
  # silently corrupt unquoted text (issue refs, ratios, times cluster here).
  - "Forging a founder's vision until the clarity itself recruits hands — distilling what good looks like until people lend their time, money, and attention not because the founder earned the right to direct, but because the clarity is undeniable. Realized: a North Star that drew a technical co-founder to commit two years, pulled in early collaborators, surfaced unprompted demand (a user calling to ask for the next session), and opened a distribution channel through a hospice network."
  - "Holding conviction falsifiably across time — treating every forged belief as a standing hypothesis that must be tested against reality and re-opened when reality contradicts it, so a founder never carries a dead conviction forward merely because it was hard to earn. Realized: the dyad derived an artifact that records each claim, what it was tested against, and whether it still holds, making held-past-contradicting-evidence an auditable violation rather than a private failure."
